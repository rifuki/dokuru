name: Build & Deploy Landing

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-landing/**'
      - '.github/workflows/build-landing.yaml'
      - '.github/workflows/deploy-compose-service.yaml'
  pull_request:
    paths:
      - 'dokuru-landing/**'
      - '.github/workflows/build-landing.yaml'
      - '.github/workflows/deploy-compose-service.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dokuru-landing
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: dokuru-landing
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Landing
    needs: docker
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      vars.DOKURU_DEPLOY_HOST != '' &&
      vars.DOKURU_DEPLOY_USER != '' &&
      vars.DOKURU_DEPLOY_PATH != ''
    uses: ./.github/workflows/deploy-compose-service.yaml
    with:
      service: dokuru-landing
      image-tag: sha-${{ github.sha }}
      run-migrations: false
    secrets: inherit
