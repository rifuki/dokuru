name: Build Server Images

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-server/**'
      - 'dokuru-core/**'
      - 'dokuru-www/**'
      - 'docker-compose.yaml'
      - '.github/workflows/build-server.yaml'
  pull_request:
    paths:
      - 'dokuru-server/**'
      - 'dokuru-core/**'
      - 'dokuru-www/**'
      - 'docker-compose.yaml'
      - '.github/workflows/build-server.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: ${{ github.repository_owner }}/dokuru-server
  MIGRATE_IMAGE_NAME: ${{ github.repository_owner }}/dokuru-server-migrate
  PLATFORMS: linux/amd64

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server metadata
        id: server-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Extract migration metadata
        id: migrate-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.MIGRATE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dokuru-server/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: type=gha,scope=dokuru-server
          cache-to: type=gha,mode=max,scope=dokuru-server

      - name: Build and push migration image
        uses: docker/build-push-action@v7
        with:
          context: dokuru-server
          file: dokuru-server/Dockerfile.migrate
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.migrate-meta.outputs.tags }}
          labels: ${{ steps.migrate-meta.outputs.labels }}
          cache-from: type=gha,scope=dokuru-server-migrate
          cache-to: type=gha,mode=max,scope=dokuru-server-migrate

  notify:
    name: Notify Status
    needs: docker
    if: always() && github.event_name != 'pull_request'
    uses: ./.github/workflows/notify.yaml
    with:
      workflow_name: "Build Server"
      status: ${{ needs.docker.result }}
    secrets:
      telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
