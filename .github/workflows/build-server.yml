name: Build & Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-server/**'
      - '.github/workflows/build-server.yml'
  pull_request:
    paths:
      - 'dokuru-server/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dokuru-server
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.tag_suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            tag_suffix: amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64
            tag_suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dokuru-server
          shared-key: release-${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        working-directory: dokuru-server
        run: cargo zigbuild --release --bin dokuru-server --target ${{ matrix.target }}

      - name: Copy binary into Docker context
        run: cp dokuru-server/target/${{ matrix.target }}/release/dokuru-server dokuru-server/dokuru-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: dokuru-server
          target: runtime-ci
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.tag_suffix }}
          build-args: BINARY=dokuru-server
          cache-from: type=gha,scope=${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag_suffix }}

  manifest:
    name: Merge Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
