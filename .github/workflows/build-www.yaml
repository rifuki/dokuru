name: Build Web Image

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-server/**'
      - 'dokuru-core/**'
      - 'dokuru-www/**'
      - 'docker-compose.yaml'
      - '.github/workflows/build-www.yaml'
  pull_request:
    paths:
      - 'dokuru-server/**'
      - 'dokuru-core/**'
      - 'dokuru-www/**'
      - 'docker-compose.yaml'
      - '.github/workflows/build-www.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dokuru-www
  PLATFORMS: linux/amd64
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.dokuru.rifuki.dev' }}
  VITE_ENABLE_HOST_SHELL: ${{ vars.VITE_ENABLE_HOST_SHELL || 'false' }}

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: dokuru-www
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_ENABLE_HOST_SHELL=${{ env.VITE_ENABLE_HOST_SHELL }}
