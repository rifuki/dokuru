name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build:
    name: Web Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dokuru-www
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build frontend
        run: bun run build
        env:
          VITE_API_BASE_URL: https://api.dokuru.rifuki.dev

  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dokuru_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            dokuru-agent
            dokuru-server

      # Agent tests
      - name: Format check (agent)
        working-directory: dokuru-agent
        run: cargo fmt --check

      - name: Clippy (agent)
        working-directory: dokuru-agent
        run: cargo clippy -- -D warnings -W clippy::pedantic -W clippy::nursery

      - name: Test (agent)
        working-directory: dokuru-agent
        run: cargo test

      - name: Check workspace (agent)
        working-directory: dokuru-agent
        run: cargo check --all-targets

      # Server tests
      - name: Format check (server)
        working-directory: dokuru-server
        run: cargo fmt --check

      - name: Clippy (server)
        working-directory: dokuru-server
        run: cargo clippy -- -D warnings

      - name: Test (server)
        working-directory: dokuru-server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/dokuru_test
          RUST_LOG: info
        run: cargo test

      - name: Check workspace (server)
        working-directory: dokuru-server
        run: cargo check --all-targets
