name: Deploy Compose Stack

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-server/**'
      - 'dokuru-core/**'
      - 'dokuru-www/**'
      - 'docker-compose.yaml'
      - 'docker-compose.override.yaml'
  workflow_dispatch:
    inputs:
      run_compose_up:
        description: Run VPS deploy once. Requires DOKURU_DEPLOY_* variables/secrets in GitHub Actions.
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      run_compose_up:
        description: Run the full Compose stack deployment instead of skipping this reusable workflow.
        required: false
        type: boolean
        default: false
      service:
        description: Deprecated compatibility input. Ignored by app deployment.
        required: false
        type: string
      image-tag:
        description: Deprecated compatibility input. Ignored by app deployment.
        required: false
        type: string
      run-migrations:
        description: Compatibility input from image build workflows. Ignored by full stack deployment.
        required: false
        type: boolean
        default: false
    secrets:
      DOKURU_DEPLOY_HOST:
        required: false
      DOKURU_DEPLOY_USER:
        required: false
      DOKURU_DEPLOY_PORT:
        required: false
      DOKURU_DEPLOY_PATH:
        required: false
      DOKURU_DEPLOY_SSH_KEY:
        required: false
      DOKURU_GHCR_TOKEN:
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Compose Stack
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_compose_up) ||
      github.event_name == 'workflow_call' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deployed: ${{ steps.gate.outputs.deploy }}
    env:
      DEPLOY_HOST: ${{ vars.DOKURU_DEPLOY_HOST || secrets.DOKURU_DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DOKURU_DEPLOY_USER || secrets.DOKURU_DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DOKURU_DEPLOY_PORT || secrets.DOKURU_DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DOKURU_DEPLOY_PATH || secrets.DOKURU_DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DOKURU_DEPLOY_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.DOKURU_GHCR_TOKEN }}
      GHCR_USER: ${{ github.actor }}
      AUTO_DEPLOY: ${{ vars.DOKURU_COMPOSE_AUTO_DEPLOY || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed deploy surfaces
        id: changes
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          need_web=false
          need_server=false

          if [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            files=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}" --jq '.files[].filename')
          else
            files=$(gh api "/repos/${GITHUB_REPOSITORY}/compare/${BEFORE_SHA}...${HEAD_SHA}" --jq '.files[].filename')
          fi

          printf 'Changed files for %s:\n%s\n' "${HEAD_SHA}" "${files}"

          while IFS= read -r file; do
            [ -n "${file}" ] || continue
            case "${file}" in
              dokuru-www/*)
                need_web=true
                ;;
              dokuru-server/*|dokuru-core/*)
                need_server=true
                ;;
            esac
          done <<< "${files}"

          printf 'need_web=%s\n' "${need_web}" >> "${GITHUB_OUTPUT}"
          printf 'need_server=%s\n' "${need_server}" >> "${GITHUB_OUTPUT}"
          printf 'Image build requirements: web=%s server=%s\n' "${need_web}" "${need_server}"

      - name: Wait for required image builds
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
          NEED_WEB: ${{ steps.changes.outputs.need_web }}
          NEED_SERVER: ${{ steps.changes.outputs.need_server }}
        run: |
          set -Eeuo pipefail

          wait_for_workflow() {
            local workflow_file="$1"
            local workflow_name="$2"

            for attempt in $(seq 1 80); do
              runs=$(gh api \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=main&event=push&per_page=50")

              success_count=$(jq '[.workflow_runs[] | select(.head_sha == env.HEAD_SHA and .status == "completed" and .conclusion == "success")] | length' <<< "${runs}")
              failed_count=$(jq '[.workflow_runs[] | select(.head_sha == env.HEAD_SHA and .status == "completed" and (.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out"))] | length' <<< "${runs}")

              if [ "${success_count}" -gt 0 ]; then
                printf '%s is successful for %s.\n' "${workflow_name}" "${HEAD_SHA}"
                return 0
              fi

              if [ "${failed_count}" -gt 0 ]; then
                printf '::error::%s failed for %s. Skipping compose deploy.\n' "${workflow_name}" "${HEAD_SHA}"
                return 1
              fi

              printf 'Waiting for %s for %s (%s/80).\n' "${workflow_name}" "${HEAD_SHA}" "${attempt}"
              sleep 15
            done

            printf '::error::Timed out waiting for %s for %s.\n' "${workflow_name}" "${HEAD_SHA}"
            return 1
          }

          if [ "${NEED_WEB}" = "true" ]; then
            wait_for_workflow "build-www.yaml" "Build Web Image"
          fi

          if [ "${NEED_SERVER}" = "true" ]; then
            wait_for_workflow "build-server.yaml" "Build Server Image"
          fi

          if [ "${NEED_WEB}" != "true" ] && [ "${NEED_SERVER}" != "true" ]; then
            printf 'No image rebuild required for this deploy.\n'
          fi

      - name: Check compose deploy gate
        id: gate
        env:
          FORCE_DEPLOY: ${{ inputs.run_compose_up }}
        run: |
          set -Eeuo pipefail

          auto_deploy=$(printf '%s' "${AUTO_DEPLOY}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')

          if [ "${FORCE_DEPLOY}" = "true" ] || [ "${auto_deploy}" = "true" ]; then
            printf 'deploy=true\n' >> "${GITHUB_OUTPUT}"
            printf 'Compose deploy gate is open.\n'
          else
            printf 'deploy=false\n' >> "${GITHUB_OUTPUT}"
            printf 'Compose deploy gate is closed. Skipping VPS deployment.\n'
          fi

      - name: Validate deployment configuration
        if: steps.gate.outputs.deploy == 'true'
        run: |
          missing=()
          [ -n "${DEPLOY_HOST}" ] || missing+=("DOKURU_DEPLOY_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("DOKURU_DEPLOY_USER")
          [ -n "${DEPLOY_PATH}" ] || missing+=("DOKURU_DEPLOY_PATH")
          [ -n "${DEPLOY_SSH_KEY}" ] || missing+=("DOKURU_DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing VPS deployment configuration: %s\n' "${missing[*]}"
            printf '::error::Set DOKURU_DEPLOY_HOST, DOKURU_DEPLOY_USER, and DOKURU_DEPLOY_PATH in GitHub Actions variables. Set DOKURU_DEPLOY_SSH_KEY in GitHub Actions secrets. DOKURU_DEPLOY_PORT is optional.\n'
            exit 1
          fi

      - name: Configure SSH
        if: steps.gate.outputs.deploy == 'true'
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/dokuru_deploy_key
          chmod 0600 ~/.ssh/dokuru_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Log in to GHCR on host
        if: steps.gate.outputs.deploy == 'true' && env.GHCR_TOKEN != ''
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | ssh -i ~/.ssh/dokuru_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "docker login ghcr.io -u '${GHCR_USER}' --password-stdin"

      - name: Deploy via Docker Compose
        if: steps.gate.outputs.deploy == 'true'
        run: |
          remote_env=$(
            printf 'DOKURU_DEPLOY_PATH=%q' "${DEPLOY_PATH}"
          )

          ssh -i ~/.ssh/dokuru_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "${remote_env} bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd "${DOKURU_DEPLOY_PATH}"

          git pull --ff-only

          test -f docker-compose.yaml

          docker compose config --quiet
          docker compose pull dokuru-server dokuru-server-migrate dokuru-www
          docker compose up -d dokuru-db dokuru-redis
          docker compose up -d --force-recreate --no-deps dokuru-server dokuru-www
          docker compose ps dokuru-db dokuru-redis dokuru-server dokuru-www
          REMOTE

  notify:
    name: Notify Status
    needs: deploy
    if: always() && needs.deploy.result != 'skipped' && (needs.deploy.result != 'success' || needs.deploy.outputs.deployed == 'true')
    uses: ./.github/workflows/notify.yaml
    with:
      workflow_name: "Deploy Compose Stack"
      status: ${{ needs.deploy.result }}
      details: |
        🚀 *Environment:* Production
        📦 *Services:* dokuru-server, dokuru-www
    secrets:
      telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
