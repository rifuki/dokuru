name: Deploy Compose Stack

on:
  workflow_dispatch:
    inputs:
      run_compose_up:
        description: Run VPS deploy once. Requires DOKURU_DEPLOY_* variables/secrets in GitHub Actions.
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows:
      - Build Server Images
    types:
      - completed
  workflow_call:
    inputs:
      run_compose_up:
        description: Run the full Compose stack deployment instead of skipping this reusable workflow.
        required: false
        type: boolean
        default: false
      service:
        description: Deprecated compatibility input. Ignored by app deployment.
        required: false
        type: string
      image-tag:
        description: Deprecated compatibility input. Ignored by app deployment.
        required: false
        type: string
      run-migrations:
        description: Compatibility input from image build workflows. Ignored by full stack deployment.
        required: false
        type: boolean
        default: false
    secrets:
      DOKURU_DEPLOY_HOST:
        required: false
      DOKURU_DEPLOY_USER:
        required: false
      DOKURU_DEPLOY_PORT:
        required: false
      DOKURU_DEPLOY_PATH:
        required: false
      DOKURU_DEPLOY_SSH_KEY:
        required: false
      DOKURU_GHCR_TOKEN:
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Compose Stack
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_compose_up) ||
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DOKURU_DEPLOY_HOST || secrets.DOKURU_DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DOKURU_DEPLOY_USER || secrets.DOKURU_DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DOKURU_DEPLOY_PORT || secrets.DOKURU_DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DOKURU_DEPLOY_PATH || secrets.DOKURU_DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DOKURU_DEPLOY_SSH_KEY }}
      GHCR_TOKEN: ${{ secrets.DOKURU_GHCR_TOKEN }}
      GHCR_USER: ${{ github.actor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for web image build
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 80); do
            runs=$(gh api \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/build-www.yaml/runs?branch=main&event=push&per_page=50")

            success_count=$(jq '[.workflow_runs[] | select(.head_sha == env.HEAD_SHA and .status == "completed" and .conclusion == "success")] | length' <<< "${runs}")
            failed_count=$(jq '[.workflow_runs[] | select(.head_sha == env.HEAD_SHA and .status == "completed" and (.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out"))] | length' <<< "${runs}")

            if [ "${success_count}" -gt 0 ]; then
              printf 'Build Web Image is successful for %s. Continuing compose deploy.\n' "${HEAD_SHA}"
              exit 0
            fi

            if [ "${failed_count}" -gt 0 ]; then
              printf '::error::Build Web Image failed for %s. Skipping compose deploy.\n' "${HEAD_SHA}"
              exit 1
            fi

            printf 'Waiting for Build Web Image for %s (%s/80).\n' "${HEAD_SHA}" "${attempt}"
            sleep 15
          done

          printf '::error::Timed out waiting for Build Web Image for %s.\n' "${HEAD_SHA}"
          exit 1

      - name: Check compose deploy gate
        id: gate
        env:
          FORCE_DEPLOY: ${{ inputs.run_compose_up }}
        run: |
          set -Eeuo pipefail

          auto_deploy=false
          if [ -f .github/compose-auto-deploy ]; then
            auto_deploy=$(tr '[:upper:]' '[:lower:]' < .github/compose-auto-deploy | tr -d '[:space:]')
          fi

          if [ "${FORCE_DEPLOY}" = "true" ] || [ "${auto_deploy}" = "true" ]; then
            printf 'deploy=true\n' >> "${GITHUB_OUTPUT}"
            printf 'Compose deploy gate is open.\n'
          else
            printf 'deploy=false\n' >> "${GITHUB_OUTPUT}"
            printf 'Compose deploy gate is closed. Skipping VPS deployment.\n'
          fi

      - name: Validate deployment configuration
        if: steps.gate.outputs.deploy == 'true'
        run: |
          missing=()
          [ -n "${DEPLOY_HOST}" ] || missing+=("DOKURU_DEPLOY_HOST")
          [ -n "${DEPLOY_USER}" ] || missing+=("DOKURU_DEPLOY_USER")
          [ -n "${DEPLOY_PATH}" ] || missing+=("DOKURU_DEPLOY_PATH")
          [ -n "${DEPLOY_SSH_KEY}" ] || missing+=("DOKURU_DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -ne 0 ]; then
            printf '::error::Missing VPS deployment configuration: %s\n' "${missing[*]}"
            printf '::error::Set DOKURU_DEPLOY_HOST, DOKURU_DEPLOY_USER, and DOKURU_DEPLOY_PATH in GitHub Actions variables. Set DOKURU_DEPLOY_SSH_KEY in GitHub Actions secrets. DOKURU_DEPLOY_PORT is optional.\n'
            exit 1
          fi

      - name: Configure SSH
        if: steps.gate.outputs.deploy == 'true'
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/dokuru_deploy_key
          chmod 0600 ~/.ssh/dokuru_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Log in to GHCR on host
        if: steps.gate.outputs.deploy == 'true' && env.GHCR_TOKEN != ''
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | ssh -i ~/.ssh/dokuru_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "docker login ghcr.io -u '${GHCR_USER}' --password-stdin"

      - name: Deploy via Docker Compose
        if: steps.gate.outputs.deploy == 'true'
        run: |
          remote_env=$(
            printf 'DOKURU_DEPLOY_PATH=%q' "${DEPLOY_PATH}"
          )

          ssh -i ~/.ssh/dokuru_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "${remote_env} bash -s" <<'REMOTE'
          set -Eeuo pipefail

          cd "${DOKURU_DEPLOY_PATH}"

          git pull

          test -f docker-compose.yaml

          docker compose config --quiet
          docker compose pull dokuru-server dokuru-server-migrate dokuru-www
          docker compose up -d dokuru-db dokuru-redis
          docker compose up -d --force-recreate --no-deps dokuru-server dokuru-www
          docker compose ps dokuru-db dokuru-redis dokuru-server dokuru-www
          REMOTE
