name: Latest Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latest-release-main
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web Dist
    uses: ./.github/workflows/reusable-web-dist.yml

  build-linux-amd64:
    name: Build Linux AMD64
    needs: build-web
    uses: ./.github/workflows/reusable-rust-release.yml
    with:
      target: x86_64-unknown-linux-musl
      artifact_name: dokuru-linux-amd64
      strip_binary: true

  build-linux-arm64:
    name: Build Linux ARM64
    needs: build-web
    uses: ./.github/workflows/reusable-rust-release.yml
    with:
      target: aarch64-unknown-linux-musl
      artifact_name: dokuru-linux-arm64

  publish-latest:
    name: Publish Rolling Latest Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dokuru-linux-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dokuru-linux-amd64 dokuru-linux-arm64 > SHA256SUMS

      - name: Compute release metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "published_at=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Remove previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Dokuru latest (${{ steps.meta.outputs.short_sha }})
          body: |
            ## Dokuru latest

            Rolling release built automatically from `main`.

            - Commit: `${{ github.sha }}`
            - Published: `${{ steps.meta.outputs.published_at }}`

            Install with:
            ```bash
            curl -fsSL https://dokuru.rifuki.dev/install | bash
            ```
          files: |
            dokuru-linux-amd64
            dokuru-linux-arm64
            SHA256SUMS
          draft: false
          prerelease: true
          generate_release_notes: false
