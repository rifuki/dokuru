name: Release Dokuru Agent

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-agent/**'
      - 'install.sh'
      - '.github/workflows/release-agent.yaml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'latest-release-main' || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: dokuru-linux-amd64
            strip_binary: true
          - target: aarch64-unknown-linux-musl
            artifact_name: dokuru-linux-arm64
            strip_binary: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dokuru-agent
          shared-key: release-${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Set build metadata
        run: |
          echo "DOKURU_AGENT_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "DOKURU_AGENT_GIT_REF=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "DOKURU_AGENT_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build release binary
        working-directory: dokuru-agent
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.strip_binary
        run: strip dokuru-agent/target/${{ matrix.target }}/release/dokuru

      - name: Rename binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            cp dokuru-agent/target/${{ matrix.target }}/release/dokuru ${{ matrix.artifact_name }}-${VERSION}
          else
            cp dokuru-agent/target/${{ matrix.target }}/release/dokuru ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "artifact_name=${{ matrix.artifact_name }}-${VERSION}" >> "$GITHUB_ENV"
          else
            echo "artifact_name=${{ matrix.artifact_name }}" >> "$GITHUB_ENV"
          fi
        
      - name: Upload to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.artifact_name }}
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dokuru-linux-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dokuru-linux-* > SHA256SUMS

      - name: Determine release type
        id: release
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "type=version" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "name=Dokuru $VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            PUBLISHED_AT="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "type=latest" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Dokuru latest ($SHORT_SHA)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "published_at=$PUBLISHED_AT" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate version manifest
        run: |
          VERSION=$(awk -F' = ' '/^version/ { gsub(/"/, "", $2); print $2; exit }' dokuru-agent/Cargo.toml)
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "git_sha": "${GITHUB_SHA}",
            "git_ref": "${GITHUB_REF_NAME}",
            "build_time": "${BUILD_TIME}",
            "target": "x86_64-unknown-linux-musl,aarch64-unknown-linux-musl",
            "release_tag": "${{ steps.release.outputs.tag }}"
          }
          EOF

      - name: Remove previous latest release
        if: steps.release.outputs.type == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create release body
        id: body
        run: |
          if [[ "${{ steps.release.outputs.type }}" == "version" ]]; then
            cat > body.md <<'EOF'
          ## 🎉 Dokuru ${{ steps.release.outputs.tag }}

          ![Release](https://img.shields.io/badge/release-${{ steps.release.outputs.tag }}-blue?style=flat-square)
          ![Platform](https://img.shields.io/badge/platform-linux-lightgrey?style=flat-square)
          ![Arch](https://img.shields.io/badge/arch-amd64%20%7C%20arm64-green?style=flat-square)

          Stable release of Dokuru Agent - Docker Security Hardening Tool.

          ### 📦 Installation

          **Quick install (latest):**
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/latest/install.sh | bash
          ```

          **Install this specific version:**
          ```bash
          # AMD64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/dokuru-linux-amd64-${{ steps.release.outputs.tag }} -o dokuru
          chmod +x dokuru
          sudo mv dokuru /usr/local/bin/

          # ARM64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/dokuru-linux-arm64-${{ steps.release.outputs.tag }} -o dokuru
          chmod +x dokuru
          sudo mv dokuru /usr/local/bin/
          ```

          ### 🔐 Verify Checksums

          ```bash
          sha256sum -c SHA256SUMS
          ```

          ### 📋 Assets

          | File | Platform | Architecture |
          |------|----------|--------------|
          | `dokuru-linux-amd64-${{ steps.release.outputs.tag }}` | Linux | x86_64 |
          | `dokuru-linux-arm64-${{ steps.release.outputs.tag }}` | Linux | aarch64 |
          | `SHA256SUMS` | - | Checksums |
          | `install.sh` | - | Installer |
          | `version.json` | - | Build manifest |

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.0.0...${{ steps.release.outputs.tag }}
          EOF
          else
            cat > body.md <<'EOF'
          ## Dokuru Latest - Agent Relay Build

          Rolling agent release built automatically from `main`.

          ### What's New

          - Relay terminal support for container exec sessions from the dashboard.
          - Relay Docker events streaming for the Events page.
          - Relay Docker info and health proxying for dashboard status cards.
          - Existing relay Docker operations continue to work for containers, images, networks, volumes, stacks, logs, stats, and inspect.

          ### Install Agent

          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/latest/install.sh | bash
          ```

          ### Direct Downloads

          | Asset | Target |
          | --- | --- |
          | `dokuru-linux-amd64` | Linux x86_64 |
          | `dokuru-linux-arm64` | Linux aarch64 |
          | `install.sh` | Agent installer |
          | `SHA256SUMS` | Checksums |
          | `version.json` | Build metadata |

          ### Build Info

          - Commit: `${{ github.sha }}`
          - Short SHA: `${{ steps.release.outputs.short_sha }}`
          - Published: `${{ steps.release.outputs.published_at }}`
          - Channel: `latest` rolling pre-release

          For stable production installs, use a versioned release tag when available.
          EOF
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body_path: body.md
          files: |
            dokuru-linux-*
            SHA256SUMS
            install.sh
            version.json
          draft: false
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: ${{ steps.release.outputs.type == 'version' }}
          generate_release_notes: ${{ steps.release.outputs.type == 'version' }}

      - name: Ensure latest release is published
        if: steps.release.outputs.type == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit latest --draft=false --prerelease
