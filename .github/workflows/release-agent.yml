name: Latest Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: latest-release-main
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: dokuru-linux-amd64
            strip_binary: true
          - target: aarch64-unknown-linux-musl
            artifact_name: dokuru-linux-arm64
            strip_binary: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dokuru-agent
          shared-key: release-${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        working-directory: dokuru-agent
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.strip_binary
        run: strip dokuru-agent/target/${{ matrix.target }}/release/dokuru

      - name: Rename binary
        run: cp dokuru-agent/target/${{ matrix.target }}/release/dokuru ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1
          compression-level: 0

  publish-latest:
    name: Publish Rolling Latest Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dokuru-linux-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dokuru-linux-* > SHA256SUMS

      - name: Compute release metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "published_at=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Remove previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Publish latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Dokuru latest (${{ steps.meta.outputs.short_sha }})
          body: |
            ## Dokuru latest

            Rolling release built automatically from `main`.

            - Commit: `${{ github.sha }}`
            - Published: `${{ steps.meta.outputs.published_at }}`

            Install with:
            ```bash
            curl -fsSL https://dokuru.rifuki.dev/install | bash
            ```
          files: |
            dokuru-linux-amd64
            dokuru-linux-arm64
            SHA256SUMS
          draft: false
          prerelease: true
          make_latest: true
          generate_release_notes: false
