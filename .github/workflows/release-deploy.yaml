name: Release Dokuru Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'dokuru-deploy/**'
      - '.github/workflows/release-deploy.yaml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'latest-deploy-main' || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dokuru-deploy (Linux AMD64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dokuru-deploy
          shared-key: release-deploy-x86_64

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set build metadata
        run: |
          echo "DOKURU_DEPLOY_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "DOKURU_DEPLOY_GIT_REF=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "DOKURU_DEPLOY_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build release binary
        working-directory: dokuru-deploy
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip dokuru-deploy/target/x86_64-unknown-linux-musl/release/dokuru-deploy

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp dokuru-deploy/target/x86_64-unknown-linux-musl/release/dokuru-deploy artifact/
          cp dokuru-deploy/install.sh artifact/install.sh
          VERSION=$(awk -F' = ' '/^version/ { gsub(/"/, "", $2); print $2; exit }' dokuru-deploy/Cargo.toml)
          cat > artifact/version.json <<EOF
          {
            "version": "${VERSION}",
            "git_sha": "${DOKURU_DEPLOY_GIT_SHA}",
            "git_ref": "${DOKURU_DEPLOY_GIT_REF}",
            "build_time": "${DOKURU_DEPLOY_BUILD_TIME}",
            "target": "x86_64-unknown-linux-musl",
            "release_tag": "latest-deploy"
          }
          EOF
          chmod +x artifact/dokuru-deploy
          chmod +x artifact/install.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dokuru-deploy-linux-amd64
          path: artifact/*
          if-no-files-found: error

  release:
    name: Publish Latest Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dokuru-deploy-linux-amd64
          path: ./

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-deploy --yes --repo ${{ github.repository }} || true
          git push origin :refs/tags/latest-deploy || true

      - name: Create latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest-deploy \
            --repo ${{ github.repository }} \
            --title "Dokuru Deploy - Latest" \
            --notes "Latest build of dokuru-deploy CLI tool

          **Installation:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/latest-deploy/install.sh | bash
          \`\`\`

          **Manual Installation:**
          \`\`\`bash
          curl -L -o dokuru-deploy https://github.com/${{ github.repository }}/releases/download/latest-deploy/dokuru-deploy
          chmod +x dokuru-deploy
          sudo mv dokuru-deploy /usr/local/bin/
          \`\`\`" \
            --prerelease \
            dokuru-deploy \
            install.sh \
            version.json

  notify:
    name: Notify Status
    needs: [build, release]
    if: always()
    uses: ./.github/workflows/notify.yaml
    with:
      workflow_name: "Release Deploy CLI"
      status: ${{ needs.release.result }}
      details: |
        🏗️ *Build:* ${{ needs.build.result }}
        📦 *Release:* ${{ needs.release.result }}
    secrets:
      telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
