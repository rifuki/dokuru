name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-web:
    name: Build Web Dist
    uses: ./.github/workflows/reusable-web-dist.yml

  build-linux-amd64:
    name: Build Linux AMD64
    needs: build-web
    uses: ./.github/workflows/reusable-rust-release.yml
    with:
      target: x86_64-unknown-linux-musl
      artifact_name: dokuru-linux-amd64
      strip_binary: true

  build-linux-arm64:
    name: Build Linux ARM64
    needs: build-web
    uses: ./.github/workflows/reusable-rust-release.yml
    with:
      target: aarch64-unknown-linux-musl
      artifact_name: dokuru-linux-arm64

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dokuru-linux-*
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: sha256sum dokuru-linux-amd64 dokuru-linux-arm64 > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Dokuru ${{ steps.version.outputs.version }}
          body: |
            ## Dokuru ${{ steps.version.outputs.version }}

            Lightweight Docker hardening agent aligned with the CIS Docker Benchmark.

            ### Rolling installer
            This installer tracks the mutable `latest` channel built from `main`.

            ```bash
            curl -fsSL https://dokuru.rifuki.dev/install | bash
            ```

            ### Stable release assets
            | Platform | Architecture | File |
            | --- | --- | --- |
            | Linux | x86_64 (AMD64) | `dokuru-linux-amd64` |
            | Linux | ARM64 | `dokuru-linux-arm64` |

            ### Verify download integrity
            ```bash
            sha256sum -c SHA256SUMS
            ```
          files: |
            dokuru-linux-amd64
            dokuru-linux-arm64
            SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: false
