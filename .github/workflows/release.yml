name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Job 1: Build frontend ────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # ─── Job 2: Build binaries ────────────────────────────────────────────────
  build-binary:
    name: Build Binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: dokuru-linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact_name: dokuru-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web/dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Install musl tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (arm64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (amd64 only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: strip target/${{ matrix.target }}/release/dokuru

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/dokuru ${{ matrix.artifact_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

  # ─── Job 3: Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dokuru ${{ steps.version.outputs.VERSION }}
          body: |
            ## 🐳 Dokuru ${{ steps.version.outputs.VERSION }}

            **Lightweight Docker Hardening Agent** — CIS Docker Benchmark v1.8.0

            ### Quick Install (Linux)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rifuki/dokuru/master/install.sh | bash
            ```

            ### Binaries
            | Platform | Architecture | File |
            |---|---|---|
            | Linux | x86_64 (AMD64) | `dokuru-linux-amd64` |
            | Linux | ARM64 (Apple M, Raspberry Pi) | `dokuru-linux-arm64` |

            ### Manual Install
            ```bash
            # Download binary sesuai arsitektur VPS
            curl -L -o /usr/local/bin/dokuru \
              https://github.com/rifuki/dokuru/releases/download/${{ steps.version.outputs.VERSION }}/dokuru-linux-amd64
            chmod +x /usr/local/bin/dokuru

            # Jalankan agent
            dokuru serve
            ```
          files: |
            dokuru-linux-amd64
            dokuru-linux-arm64
          draft: false
          prerelease: false
          generate_release_notes: false
