name: Reusable Rust Release Build

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      strip_binary:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-release-binary:
    name: Build ${{ inputs.artifact_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.target }}

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ inputs.target }}

      - name: Build release binary
        run: cargo zigbuild --release --target ${{ inputs.target }}

      - name: Strip binary
        if: inputs.strip_binary
        run: strip target/${{ inputs.target }}/release/dokuru

      - name: Rename binary
        run: cp target/${{ inputs.target }}/release/dokuru ${{ inputs.artifact_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_name }}
          retention-days: 1
