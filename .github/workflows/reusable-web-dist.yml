name: Reusable Web Dist

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-web-dist:
    name: Build Web Dist
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
