name: Toggle Compose Auto Deploy

on:
  workflow_dispatch:
    inputs:
      faucet:
        description: Open or close automatic VPS compose deployment after main image builds.
        required: true
        type: choice
        options:
          - open
          - close
        default: open

permissions:
  contents: write

jobs:
  toggle:
    name: ${{ inputs.faucet == 'open' && 'Open Auto Deploy Faucet' || 'Close Auto Deploy Faucet' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update auto-deploy gate
        env:
          FAUCET: ${{ inputs.faucet }}
        run: |
          set -Eeuo pipefail

          case "${FAUCET}" in
            open)
              printf 'true\n' > .github/compose-auto-deploy
              printf 'Compose auto deploy is now OPEN. Future main image builds can deploy the VPS compose stack.\n'
              ;;
            close)
              printf 'false\n' > .github/compose-auto-deploy
              printf 'Compose auto deploy is now CLOSED. Future main image builds will not deploy the VPS compose stack.\n'
              ;;
          esac

          if git diff --quiet -- .github/compose-auto-deploy; then
            printf 'Compose auto deploy gate was already %s.\n' "${FAUCET}"
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/compose-auto-deploy
          git commit -m "chore(deploy): ${FAUCET} compose auto deploy [skip ci]"
          git push
