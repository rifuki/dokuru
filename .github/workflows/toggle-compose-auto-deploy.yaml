name: Toggle Compose Auto Deploy

on:
  workflow_dispatch:
    inputs:
      faucet:
        description: Open deploys once now and enables future automatic VPS compose deploys. Close disables future automatic deploys.
        required: true
        type: choice
        options:
          - open
          - close
        default: open

permissions:
  actions: write

jobs:
  toggle:
    name: ${{ inputs.faucet == 'open' && 'Open Auto Deploy Faucet' || 'Close Auto Deploy Faucet' }}
    runs-on: ubuntu-latest
    steps:
      - name: Update auto-deploy gate
        env:
          FAUCET: ${{ inputs.faucet }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          case "${FAUCET}" in
            open)
              value=true
              printf 'Compose auto deploy is now OPEN. Future main image builds can deploy the VPS compose stack.\n'
              ;;
            close)
              value=false
              printf 'Compose auto deploy is now CLOSED. Future main image builds will not deploy the VPS compose stack.\n'
              ;;
          esac

          gh variable set DOKURU_COMPOSE_AUTO_DEPLOY \
            --repo "${GITHUB_REPOSITORY}" \
            --body "${value}"

  deploy-on-open:
    name: Deploy Compose Stack After Opening Faucet
    needs: toggle
    if: inputs.faucet == 'open'
    uses: ./.github/workflows/deploy-compose-service.yaml
    with:
      run_compose_up: true
      service: dokuru-server
      image-tag: latest
      run-migrations: false
    secrets: inherit
