services:
  # ===========================================================================
  # Database (profile: db)
  # ===========================================================================
  dokuru-db:
    image: postgres:16-alpine
    container_name: dokuru-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dokuru_db
      POSTGRES_USER: dokuru
      POSTGRES_PASSWORD: ${DOKURU_DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - dokuru_pg_data:/var/lib/postgresql/data
    networks:
      - dokuru-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokuru -d dokuru_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Cache (profile: db)
  # ===========================================================================
  dokuru-redis:
    image: redis:7-alpine
    container_name: dokuru-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dokuru_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dokuru-internal

  # ===========================================================================
  # Database Admin (profile: db)
  # ===========================================================================
  dokuru-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dokuru-pgadmin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dokuru-pgadmin.rule=Host(`db.dokuru.rifuki.dev`)"
      - "traefik.http.routers.dokuru-pgadmin.entrypoints=websecure"
      - "traefik.http.routers.dokuru-pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.dokuru-pgadmin.loadbalancer.server.port=80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_Email:-admin@dokuru.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIn_password:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - dokuru_pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      dokuru-db:
        condition: service_healthy
    networks:
      - dokuru-internal
      - traefik-public

  # ===========================================================================
  # App
  # ===========================================================================
  dokuru-server:
    image: ghcr.io/rifuki/dokuru-server:${VERSION:-latest}
    container_name: dokuru-server
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dokuru-api.rule=Host(`api.dokuru.rifuki.dev`)"
      - "traefik.http.routers.dokuru-api.entrypoints=websecure"
      - "traefik.http.routers.dokuru-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dokuru-server.loadbalancer.server.port=9393"
    env_file: ./dokuru-server/.env
    # environment:
      # DATABASE_URL: postgres://dokuru:${DOKURU_DB_PASSWORD:-secret}@dokuru-db:5432/dokuru_db
      # REDIS_URL: redis://dokuru-redis:6379
    depends_on:
      dokuru-db:
        condition: service_healthy
      dokuru-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9393/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dokuru-internal
      - traefik-public

  dokuru-www:
    image: ghcr.io/rifuki/dokuru-www:${VERSION:-latest}
    container_name: dokuru-www
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dokuru-web.rule=Host(`app.dokuru.rifuki.dev`)"
      - "traefik.http.routers.dokuru-web.entrypoints=websecure"
      - "traefik.http.routers.dokuru-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.dokuru-web.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik-public

networks:
  dokuru-internal:
    name: dokuru-internal
    driver: bridge
  traefik-public:
    name: traefik-public
    external: true

volumes:
  dokuru_pg_data:
    name: dokuru_pg_data
  dokuru_redis_data:
    name: dokuru_redis_data
  dokuru_pgadmin_data:
    name: dokuru_pgadmin_data
