<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Dokuru — Agent-based Docker security auditing. CIS-aligned checks for namespace isolation, cgroup controls, and runtime hardening."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;500;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Dokuru — Docker Security Auditing</title>

    <style>
      body {
        margin: 0;
        background: #050505;
      }

      body.dokuru-app-ready #app-fallback {
        display: none;
      }

      #app-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #fff;
        font-family:
          Chivo,
          IBM Plex Sans,
          system-ui,
          -apple-system,
          sans-serif;
        background:
          linear-gradient(90deg, rgba(36, 150, 237, 0.12), transparent 45%),
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          #050505;
        background-size: auto, 48px 48px, 48px 48px, auto;
      }

      .fallback-shell {
        width: min(1120px, calc(100vw - 48px));
      }

      .fallback-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 96px;
        font-weight: 900;
        font-size: 24px;
      }

      .fallback-mark {
        width: 34px;
        height: 34px;
        border: 2px solid #2496ed;
        border-radius: 8px;
        box-shadow: 0 0 32px rgba(36, 150, 237, 0.35);
      }

      .fallback-kicker {
        width: fit-content;
        margin-bottom: 28px;
        padding: 12px 20px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        color: #a1a1aa;
        font-family: JetBrains Mono, monospace;
        font-size: 13px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .fallback-title {
        max-width: 760px;
        margin: 0;
        font-size: clamp(58px, 8vw, 116px);
        line-height: 0.95;
        letter-spacing: -0.08em;
        font-weight: 900;
      }

      .fallback-title span {
        color: #7cc4ff;
      }

      .fallback-copy {
        max-width: 720px;
        margin: 32px 0 0;
        color: #a1a1aa;
        font-size: 24px;
        line-height: 1.55;
      }
    </style>

    <link data-trunk rel="copy-file" href="public/favicon.svg" />
    <link data-trunk rel="copy-dir" href="public" />
    <link data-trunk rel="css" href="style/app.generated.css" />
    <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="z" />
  </head>
  <body>
    <section id="app-fallback" aria-label="Dokuru landing preview">
      <div class="fallback-shell">
        <div class="fallback-brand">
          <div class="fallback-mark" aria-hidden="true"></div>
          <span>dokuru</span>
        </div>
        <div class="fallback-kicker">CIS Docker benchmark v1.8.0 aligned</div>
        <h1 class="fallback-title">
          Monitor Docker security across your <span>infrastructure.</span>
        </h1>
        <p class="fallback-copy">
          Dokuru audits Docker hosts using CIS-aligned checks focused on namespace isolation,
          cgroup controls, and critical runtime hardening.
        </p>
      </div>
    </section>
    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
