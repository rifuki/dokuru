server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/install(.sh)?$ {
        return 302 https://github.com/rifuki/dokuru/releases/download/latest/install.sh;
    }

    location ~ ^/deploy(.sh)?$ {
        return 302 https://github.com/rifuki/dokuru/releases/download/latest-deploy/install.sh;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
