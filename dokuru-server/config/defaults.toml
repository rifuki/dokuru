# Base application defaults baked into the binary at compile time.
# Precedence (highest wins):
#   environment variables / .env
#   config/secrets.toml
#   config/local.toml
#   config/defaults.toml
#
# Keep this file non-secret and safe to commit.

[app]
rust_env = "development"
rust_log = "debug"

[server]
port = 9393
cors_allowed_origins = ["https://app.dokuru.rifuki.dev", "http://localhost:5173"]

[bootstrap]
enabled = true
admin_email = "dokuru@rifuki.dev"
admin_username = "admin"
admin_name = "Administrator"


[database]
url = ""
max_connections = 10
min_connections = 1

[redis]
url = "redis://localhost:6379"

[auth]
access_secret = ""
refresh_secret = ""
access_expiry_secs = 3600
refresh_expiry_secs = 604800

[cookie]
same_site = "lax"   # strict | lax | none. Default: strict (prod), lax (dev)
secure = false      # true | false. Default: true (prod), false (dev)
http_only = true    # true | false. Default: true
# Scenarios:
# - Cross-port dev (5173->8080): lax (default dev)
# - Cross-subdomain: none + secure=true
# - Same origin: strict (most secure)

[upload]
dir = "./uploads"
base_url = "https://api.dokuru.rifuki.dev/media"
max_avatar_size = 2097152 # 2 MB in bytes

[email]
resend_api_key = ""
from_email = "noreply@dokuru.rifuki.dev"
